<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | PsiFácil</title>
    <link rel="stylesheet" href="css/cadastro-usuario.css">
</head>

<body>

    <main class="login-page">
        <section class="login-card">
            <span class="tag">Criar conta</span>

            <h1>Cadastre-se</h1>
            <p>Crie sua conta para interagir com os conteúdos do PsiFácil.</p>

            <form id="formCadastro">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="nome" placeholder="Seu nome completo">
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="seuemail@email.com">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha">
                </div>

                <p id="mensagemErro" class="mensagem-erro"></p>

                <button type="submit">Criar conta</button>
            </form>

            <a href="login-usuario.html" class="back-link">
                Já tenho conta
            </a>

            <a href="psifacil.html" class="back-link">
                Voltar para o site
            </a>
        </section>
    </main>
    <div id="toast" class="toast"></div>
    <script src="js/cadastro.js"></script>
</body>

</html>
