<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PsiFácil</title>
    <link rel="stylesheet" href="css/login-usuario.css">
</head>

<body>

    <main class="login-page">
        <section class="login-card">
            <span class="tag">Área do usuário</span>

            <h1>Entrar</h1>
            <p>Acesse sua conta para interagir com os conteúdos.</p>

            <form id="formLoginUsuario">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="seuemail@email.com">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="Sua senha">
                </div>

                <p id="mensagemErro" class="mensagem-erro"></p>

                <button type="submit">Entrar</button>
            </form>

            <a href="cadastro.html" class="back-link">
                Criar minha conta
            </a>

            <a href="psifacil.html" class="back-link">
                Voltar para o site
            </a>
        </section>
    </main>
    <div id="toast" class="toast"></div>
    <script src="js/login-usuario.js"></script>
</body>

</html>
